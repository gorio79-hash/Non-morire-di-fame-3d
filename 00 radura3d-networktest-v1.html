<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radura — Test Rete v1</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #1b1410; overflow: hidden;
    font-family: -apple-system, sans-serif;
    touch-action: none;
  }
  #arena {
    display: block; width: 100%; height: 100%;
  }
  #hud {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    background: rgba(20,16,12,0.85); color: #f4ecdc;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    line-height: 1.6; max-width: 280px;
  }
  #hud .status { font-weight: bold; }
  #hud .status.ok { color: #9fd49a; }
  #hud .status.connecting { color: #f2c14e; }
  #hud .status.err { color: #d6453d; }
  #hint {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 10;
    background: rgba(20,16,12,0.85); color: #d9c9a3;
    padding: 8px 12px; border-radius: 8px; font-size: 12px; text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Stato: <span class="status connecting" id="statusText">connessione...</span></div>
  <div>Il tuo nome: <span id="myName">—</span></div>
  <div>Giocatori connessi: <span id="playerCount">1</span></div>
  <div id="latencyLine">Latenza media: —</div>
</div>
<div id="hint">
  Trascina o clicca sullo schermo per muovere il tuo pallino. Apri questa stessa pagina da un altro dispositivo (o un'altra scheda) per vedere gli altri giocatori muoversi in tempo reale.
</div>

<canvas id="arena"></canvas>

<!-- Client Supabase via CDN, come modulo ESM — stessa convenzione del progetto -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ── Configurazione (29/6-30/6, primo test di rete) ──────────────────────
// Project URL + chiave "publishable" (equivalente alla vecchia "anon
// public key", solo con un nome nuovo — vedi passaggio di progetto).
// Questa chiave è pensata per stare nel codice pubblico: NON è un
// segreto, a differenza della "secret key"/service_role, che non va MAI
// messa qui. Il canale usato sotto (Realtime Broadcast) è pubblico di
// default e non richiede nessuna configurazione aggiuntiva sul database.
const SUPABASE_URL = 'https://erkhdadhanmnrqbiijac.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AfaB8nWi9vnkZIUcA4VpHQ_rgCOWlAk';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Identità locale ────────────────────────────────────────────────────
// Nome/colore casuali generati a ogni caricamento pagina — solo per
// distinguere visivamente i partecipanti in questo test, non hanno altro
// significato. In un secondo passo (quando integriamo nel gioco vero)
// questo diventerà il ruolo scelto dal giocatore.
const myId = 'p_' + Math.random().toString(36).slice(2, 9);
const NAMES = ['Volpe', 'Corvo', 'Tasso', 'Lince', 'Falco', 'Cervo', 'Lupo', 'Faina'];
const COLORS = ['#e0793a', '#6f9bd1', '#9fd49a', '#f2c14e', '#d18a6f', '#b58ad1', '#6fd1c5', '#d16f9b'];
const myName = NAMES[Math.floor(Math.random() * NAMES.length)] + '-' + myId.slice(-3);
const myColor = COLORS[Math.floor(Math.random() * COLORS.length)];
document.getElementById('myName').textContent = myName;

// ── Stato condiviso in memoria ─────────────────────────────────────────
// Ogni voce: { x, z, name, color, lastSeen }. "z" per coerenza con le
// coordinate del gioco 3D (piano orizzontale), anche se qui il rendering
// è 2D dall'alto — non ha altro significato in questo test.
const players = new Map();
players.set(myId, { x: 0, z: 0, name: myName, color: myColor, lastSeen: Date.now(), self: true });

// ── Canale Realtime Broadcast ──────────────────────────────────────────
// Un solo canale condiviso da tutti i client che aprono questa pagina —
// niente tabelle da creare, niente schema da progettare: il canale è
// solo un "tubo" che inoltra messaggi a chiunque sia iscritto. Nome scelto
// per essere specifico al progetto (evita collisioni accidentali se in
// futuro lo stesso progetto Supabase ospitasse altri test).
const CHANNEL_NAME = 'radura3d-networktest-v1';
const channel = supabase.channel(CHANNEL_NAME, {
  config: { broadcast: { self: false } } // non ricevere i propri messaggi, inutile rifletterli a se stessi
});

const latencySamples = [];
function recordLatency(sentAt) {
  const ms = Date.now() - sentAt;
  latencySamples.push(ms);
  if (latencySamples.length > 20) latencySamples.shift();
  const avg = Math.round(latencySamples.reduce((a, b) => a + b, 0) / latencySamples.length);
  document.getElementById('latencyLine').textContent = `Latenza media: ${avg} ms (su ${latencySamples.length} messaggi)`;
}

channel.on('broadcast', { event: 'move' }, (msg) => {
  const p = msg.payload;
  if (!p || p.id === myId) return;
  players.set(p.id, {
    x: p.x, z: p.z, name: p.name, color: p.color,
    lastSeen: Date.now(), self: false
  });
  if (typeof p.sentAt === 'number') recordLatency(p.sentAt);
  updatePlayerCount();
});

const statusEl = document.getElementById('statusText');
channel.subscribe((status, err) => {
  if (status === 'SUBSCRIBED') {
    statusEl.textContent = 'connesso';
    statusEl.className = 'status ok';
    broadcastPosition(); // annuncia subito la propria posizione ai già connessi
  } else if (status === 'CHANNEL_ERROR') {
    statusEl.textContent = 'errore di connessione' + (err ? ` (${err.message})` : '');
    statusEl.className = 'status err';
  } else if (status === 'TIMED_OUT') {
    statusEl.textContent = 'timeout — il server non ha risposto in tempo';
    statusEl.className = 'status err';
  } else if (status === 'CLOSED') {
    statusEl.textContent = 'connessione chiusa';
    statusEl.className = 'status err';
  } else {
    statusEl.textContent = status;
    statusEl.className = 'status connecting';
  }
});

function updatePlayerCount() {
  // pulizia: chi non manda nulla da 8s è considerato disconnesso
  const now = Date.now();
  for (const [id, p] of players) {
    if (!p.self && now - p.lastSeen > 8000) players.delete(id);
  }
  document.getElementById('playerCount').textContent = players.size;
}
setInterval(updatePlayerCount, 2000);

// ── Invio posizione (throttled) ────────────────────────────────────────
let lastSendAt = 0;
const SEND_INTERVAL_MS = 100; // max 10 invii/secondo, sufficiente per un test di movimento
function broadcastPosition() {
  const now = Date.now();
  if (now - lastSendAt < SEND_INTERVAL_MS) return;
  lastSendAt = now;
  const me = players.get(myId);
  channel.send({
    type: 'broadcast',
    event: 'move',
    payload: { id: myId, x: me.x, z: me.z, name: me.name, color: me.color, sentAt: now }
  });
}

// ── Movimento locale (canvas 2D, solo per questo test) ─────────────────
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function moveMeTo(clientX, clientY) {
  const me = players.get(myId);
  me.x = clientX;
  me.z = clientY;
  broadcastPosition();
}
canvas.addEventListener('pointerdown', e => moveMeTo(e.clientX, e.clientY));
canvas.addEventListener('pointermove', e => { if (e.buttons > 0 || e.pressure > 0) moveMeTo(e.clientX, e.clientY); });

// posizione iniziale al centro schermo
players.get(myId).x = window.innerWidth / 2;
players.get(myId).z = window.innerHeight / 2;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1b1410';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const [id, p] of players) {
    ctx.beginPath();
    ctx.arc(p.x, p.z, p.self ? 16 : 12, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    if (p.self) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#f4ecdc';
      ctx.stroke();
    }
    ctx.fillStyle = '#f4ecdc';
    ctx.font = '12px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, p.x, p.z - (p.self ? 24 : 20));
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
